<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>圣经金句</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
      background: #f7f7f7;
    }
    #text {
      font-size: 24px;
      margin-bottom: 20px;
    }
    #ref {
      color: #666;
    }
    button {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>📖 圣经金句</h1>

  <div id="text">加载中...</div>
  <div id="ref"></div>

  <button onclick="loadVerse()">换一句</button>

  <script>
    async function loadVerse() {
      try {
        const res = await fetch('/sentences/pentateuch.json')
        const data = await res.json()

        const random = data[Math.floor(Math.random() * data.length)]

        document.getElementById('text').innerText = random.text || random.hitokoto
        document.getElementById('ref').innerText = random.from || ''
      } catch (e) {
        document.getElementById('text').innerText = '加载失败'
      }
    }

    loadVerse()
  </script>

</body>
</html>
