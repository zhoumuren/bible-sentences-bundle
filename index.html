<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>圣经金句</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
      background: #f7f7f7;
    }

    #text {
      font-size: 24px;
      margin-bottom: 20px;
      transition: opacity 0.5s;
    }

    #ref {
      color: #666;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>📖 圣经金句</h1>

  <div id="text">加载中...</div>
  <div id="ref"></div>

  <button id="btn">换一句</button>

  <script>
    let timer = null;

    async function loadVerse() {
      const textEl = document.getElementById('text');

      try {
        textEl.style.opacity = 0;

        const res = await fetch('/sentences/pentateuch.json');
        const data = await res.json();

        const random = data[Math.floor(Math.random() * data.length)];

        setTimeout(() => {
          document.getElementById('text').innerText = random.bibleverses;
          document.getElementById('ref').innerText = random.from || '';
          textEl.style.opacity = 1;
        }, 200);

      } catch (e) {
        document.getElementById('text').innerText = '加载失败';
        console.error(e);
      }
    }

    // ✅ 自动轮播（5秒）
    function startAutoPlay() {
      timer = setInterval(loadVerse, 5000);
    }

    // ✅ 初始化
    loadVerse();
    startAutoPlay();

    // ✅ 手动点击（重置计时）
    document.getElementById('btn').addEventListener('click', () => {
      loadVerse();
      clearInterval(timer);
      startAutoPlay();
    });
  </script>

</body>
</html>
